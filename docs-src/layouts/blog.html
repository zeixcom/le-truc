<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>{{ title }} – Le Truc Blog</title>
		<meta name="description" content="{{ description }}" />
		<meta name="author" content="{{ author }}" />
		<meta name="article:published_time" content="{{ published-date }}" />
		<meta name="article:modified_time" content="{{ modified-date }}" />
		<link
			rel="preload"
			href="{{ base-path }}assets/main.css?v={{ css-hash }}"
			as="style"
		/>
		<link
			rel="modulepreload"
			href="{{ base-path }}assets/main.js?v={{ js-hash }}"
		/>
		<link
			rel="stylesheet"
			href="{{ base-path }}assets/main.css?v={{ css-hash }}"
		/>
		<script
			type="module"
			src="{{ base-path }}assets/main.js?v={{ js-hash }}"
		></script>
	</head>
	<body class="blog">
		<context-router>
			<header class="content-grid">
				<a href="#main" class="skiplink visually-hidden">
					Skip to main content
				</a>
				<h1 class="content">
					<a href="{{ base-path }}blog.html">Le Truc Blog</a>
					<small>{{ version }}</small>
				</h1>
				<card-callout class="content danger" hidden>
					<p class="error" role="alert" aria-live="assertive"></p>
				</card-callout>
			</header>
			<main id="main" class="content-grid">
				<section-hero>
					<h1>{{ emoji }} {{ title }}</h1>
					<div class="hero-layout">
						<div class="lead">
							<card-blogmeta>
								<span>
									<img src="{{ author-avatar }}" alt="Avatar of {{ author }}" />
									<span>{{ author }}</span>
								</span>
								<span>
									<time class="published" datetime="{{ published-date }}">
										{{ published-date }}
									</time>
									<span class="modified">
										· updated on
										<time datetime="{{ modified-date }}">
											{{ modified-date }}
										</time>
									</span>
								</span>
								<span>{{ reading-time }} min read</span>
							</card-blogmeta>
							<p>{{ description }}</p>
						</div>
					</div>
				</section-hero>
				{{ content }}
			</main>
			<!-- <div class="blog-nav">
				<div class="content-grid">
					<div class="content">
						<nav class="blog-nav-links" aria-label="Blog navigation">
							<a href="{{ prev-post }}" class="blog-nav-link prev">
								<span class="blog-nav-label">← Previous</span>
								<span class="blog-nav-title">{{ prev-post-title }}</span>
							</a>
							<a href="{{ base-path }}blog.html" class="blog-nav-link">
								📋 All Posts
							</a>
							<a href="{{ next-post }}" class="blog-nav-link next">
								<span class="blog-nav-label">Next →</span>
								<span class="blog-nav-title">{{ next-post-title }}</span>
							</a>
						</nav>
					</div>
				</div>
			</div> -->
			<footer class="content-grid">
				<div class="content">
					<h2 class="visually-hidden">Footer</h2>
					<p>© 2024 – 2026 Zeix AG</p>
				</div>
			</footer>
		</context-router>
	</body>
</html>
