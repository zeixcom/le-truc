<basic-gauge
	thresholds='[
		{"min":0.8,"label":"Good job!","color":"var(--color-green-70)"},
		{"min":0.5,"label":"Decent","color":"var(--color-orange-70)"},
		{"min":0,"label":"Try again!","color":"var(--color-pink-70)"}
	]'
>
	<p id="basic-gauge-label-1">Speed:</p>
	<meter
		class="visually-hidden"
		value="0.84"
		aria-labelledby="basic-gauge-label-1"
	></meter>
	<basic-number
		value="0.84"
		options='{"style":"percent","maximumFractionDigits":1}'
		>84%</basic-number
	>
	<small class="label">Good job!</small>
</basic-gauge>
