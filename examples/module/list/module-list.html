<module-list>
	<span role="status" class="visually-hidden"></span>
	<ul data-container aria-label="Items"></ul>
	<template>
		<li>
			<button
				type="button"
				class="reorder"
				aria-label="Drag to reorder"
				aria-pressed="false"
			>
				≡
			</button>
			<span><slot></slot></span>
			<basic-button class="edit">
				<button type="button" class="tertiary" aria-label="Edit">✎</button>
			</basic-button>
			<basic-button class="remove">
				<button type="button" class="tertiary destructive" aria-label="Remove">
					×
				</button>
			</basic-button>
		</li>
	</template>
	<form>
		<form-textbox clearable>
			<label for="new-item-input">New item</label>
			<div class="input">
				<input
					type="text"
					id="new-item-input"
					name="new-item"
					autocomplete="off"
				/>
				<button type="button" class="clear" aria-label="Clear input" hidden>
					✕
				</button>
			</div>
		</form-textbox>
		<basic-button class="add">
			<button type="submit" class="constructive">Add</button>
		</basic-button>
	</form>
</module-list>
