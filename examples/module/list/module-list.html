<module-list>
	<span role="status" class="visually-hidden"></span>
	<ul data-container aria-label="Items"></ul>
	<template>
		<li>
			<button
				type="button"
				class="reorder"
				aria-label="Drag to reorder"
				aria-pressed="false"
			>
				≡
			</button>
			<form-inplace-edit>
				<span></span>
				<button type="button" aria-label="Edit">✎</button>
			</form-inplace-edit>
			<basic-button class="remove">
				<button type="button" class="tertiary destructive" aria-label="Remove">
					×
				</button>
			</basic-button>
		</li>
	</template>
</module-list>
